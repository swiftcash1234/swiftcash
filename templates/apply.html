{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto px-4 py-12">
    <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
        <h2 class="text-2xl font-bold text-gray-900 mb-6">Loan Application</h2>
        <form id="applyForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                <input type="text" name="fullName" required class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number (Safaricom)</label>
                <input type="text" name="phoneNumber" placeholder="07... or 254..." required class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">National ID Number</label>
                <input type="text" name="nationalId" required class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Loan Purpose</label>
                <select name="loanType" class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none">
                    <option value="personal">Personal</option>
                    <option value="business">Business</option>
                    <option value="emergency">Emergency</option>
                    <option value="education">Education</option>
                </select>
            </div>
            <button type="submit" class="w-full bg-teal-500 hover:bg-teal-600 text-white font-semibold py-3 rounded-lg transition">
                Continue
            </button>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('applyForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData.entries());
    
    try {
        const response = await fetch('/api/loan/apply/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token }}'
            },
            body: JSON.stringify(data)
        });
        const result = await response.json();
        if (result.success) {
            window.location.href = `/offers/?applicationId=${result.applicationId}&name=${encodeURIComponent(result.name)}&phone=${result.phone}`;
        } else {
            alert(result.error || 'Application failed');
        }
    } catch (error) {
        alert('An error occurred');
    }
});
</script>
{% endblock %}
